name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        draft: false
        prerelease: false

  publish-npm:
    name: Publish to NPM
    runs-on: ubuntu-latest
    needs: create-release
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        registry-url: 'https://registry.npmjs.org'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm install
      
    - name: Publish to NPM
      run: npm publish --access public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  test-installation:
    name: Test Installation
    runs-on: ubuntu-latest
    needs: publish-npm
    strategy:
      matrix:
        package-manager: [npm, bun, pnpm, yarn]
    steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        
    - name: Setup Bun
      if: matrix.package-manager == 'bun'
      uses: oven-sh/setup-bun@v1
      
    - name: Setup pnpm
      if: matrix.package-manager == 'pnpm'
      uses: pnpm/action-setup@v2
      
    - name: Test fresh installation
      run: |
        mkdir test-project
        cd test-project
        
        if [ "${{ matrix.package-manager }}" = "npm" ]; then
          npm init -y
          npm install -D code-quality-lib
          npx code-quality --help
        elif [ "${{ matrix.package-manager }}" = "bun" ]; then
          bun init -y
          bun add -D code-quality-lib
          bunx code-quality --help
        elif [ "${{ matrix.package-manager }}" = "pnpm" ]; then
          pnpm init
          pnpm add -D code-quality-lib
          pnpm dlx code-quality --help
        elif [ "${{ matrix.package-manager }}" = "yarn" ]; then
          yarn init -y
          yarn add -D code-quality-lib
          yarn dlx code-quality --help
        fi
