name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-matrix:
    name: Test on ${{ matrix.os }} with ${{ matrix.package-manager }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        package-manager: [npm, bun, pnpm, yarn]
        exclude:
          # Exclude some combinations to reduce CI time while maintaining coverage
          - os: windows-latest
            package-manager: bun
          - os: macos-latest
            package-manager: bun
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Setup Bun
        if: matrix.package-manager == 'bun'
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Setup pnpm
        if: matrix.package-manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: '10.x'

      - name: Enable Corepack
        if: matrix.package-manager == 'yarn'
        run: corepack enable

      - name: Setup Yarn
        if: matrix.package-manager == 'yarn'
        run: corepack prepare yarn@4.13.0 --activate

      - name: Install dependencies
        shell: bash
        run: |
          if [ "${{ matrix.package-manager }}" = "npm" ]; then
            npm_config_loglevel=error npm ci --prefer-offline --no-audit
          elif [ "${{ matrix.package-manager }}" = "bun" ]; then
            bun install
          elif [ "${{ matrix.package-manager }}" = "pnpm" ]; then
            pnpm install
          elif [ "${{ matrix.package-manager }}" = "yarn" ]; then
            yarn install --no-immutable
          fi

      - name: Run tests
        shell: bash
        run: |
          if [ "${{ matrix.package-manager }}" = "npm" ]; then
            npm test
          elif [ "${{ matrix.package-manager }}" = "bun" ]; then
            bun test/basic.test.js
          elif [ "${{ matrix.package-manager }}" = "pnpm" ]; then
            pnpm test
          elif [ "${{ matrix.package-manager }}" = "yarn" ]; then
            yarn test
          fi

      - name: Test CLI
        run: node index.js --help

  validate-version:
    name: Validate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_new_version: ${{ steps.version_check.outputs.is_new }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22.x'

      - name: Extract version
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 Package version: $VERSION"

      - name: Validate tag version
        shell: bash
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          PACKAGE_VERSION=${{ steps.version.outputs.version }}
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "❌ Tag version ($TAG_VERSION) does not match package version ($PACKAGE_VERSION)"
            exit 1
          else
            echo "✅ Tag version matches package version"
          fi

      - name: Check if version is already published
        id: version_check
        shell: bash
        run: |
          VERSION=${{ steps.version.outputs.version }}
          PUBLISHED=$(npm view code-quality-lib versions --json 2>/dev/null || echo "[]")
          if echo "$PUBLISHED" | grep -q "\"$VERSION\""; then
            echo "is_new_version=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ Version $VERSION already published"
          else
            echo "is_new_version=true" >> "$GITHUB_OUTPUT"
            echo "✅ Version $VERSION is new"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [test-matrix, validate-version]
    if: needs.validate-version.outputs.is_new_version == 'true'
    outputs:
      release_url: ${{ steps.create_release.outputs.html_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          VERSION=${{ needs.validate-version.outputs.version }}
          # Get previous tag for changelog
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" $PREV_TAG..HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)")
          fi
          
          # Create release body
          cat > release_body.md << EOF
          ## 🚀 Release $VERSION
          
          ### 📋 Changes
          $CHANGELOG
          
          ### 📦 Installation
          \`\`\`bash
          npm install code-quality-lib@$VERSION
          \`\`\`
          
          ### 🔧 Usage
          \`\`\`bash
          npx code-quality --help
          \`\`\`
          EOF
          
          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          cat release_body.md >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: Release ${{ needs.validate-version.outputs.version }}
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    name: Publish to NPM
    runs-on: ubuntu-latest
    needs: [test-matrix, validate-version, create-release]
    if: needs.validate-version.outputs.is_new_version == 'true'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Validate package
        shell: bash
        run: |
          echo "🔍 Validating package..."
          npm pack --dry-run
          echo "✅ Package validation passed"

      - name: Publish to NPM (Dry Run)
        run: npm publish --dry-run --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to NPM
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify publication
        shell: bash
        run: |
          VERSION=${{ needs.validate-version.outputs.version }}
          npm view code-quality-lib@$VERSION
          echo "✅ Package successfully published to NPM"

  test-installation:
    name: Test Installation (${{ matrix.package-manager }})
    runs-on: ubuntu-latest
    needs: [publish-npm, validate-version]
    if: needs.validate-version.outputs.is_new_version == 'true'
    strategy:
      matrix:
        package-manager: [npm, bun, pnpm, yarn]
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22.x'

      - name: Setup Bun
        if: matrix.package-manager == 'bun'
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Setup pnpm
        if: matrix.package-manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: '10.x'

      - name: Enable Corepack
        if: matrix.package-manager == 'yarn'
        run: corepack enable

      - name: Setup Yarn
        if: matrix.package-manager == 'yarn'
        run: corepack prepare yarn@4.13.0 --activate

      - name: Test fresh installation
        shell: bash
        run: |
          VERSION=${{ needs.validate-version.outputs.version }}
          mkdir test-project
          cd test-project

          if [ "${{ matrix.package-manager }}" = "npm" ]; then
            npm init -y
            npm install -D code-quality-lib@$VERSION
            npx code-quality --help
          elif [ "${{ matrix.package-manager }}" = "bun" ]; then
            bun init -y
            bun add -D code-quality-lib@$VERSION
            bunx code-quality --help
          elif [ "${{ matrix.package-manager }}" = "pnpm" ]; then
            pnpm init
            pnpm add -D code-quality-lib@$VERSION
            pnpm dlx code-quality --help
          elif [ "${{ matrix.package-manager }}" = "yarn" ]; then
            yarn init -y
            yarn add -D code-quality-lib@$VERSION
            yarn dlx code-quality --help
          fi

  notify-success:
    name: Release Success
    runs-on: ubuntu-latest
    needs: [test-matrix, validate-version, create-release, publish-npm, test-installation]
    if: always() && needs.publish-npm.result == 'success'
    steps:
      - name: Success notification
        shell: bash
        run: |
          echo "🎉 Release ${{ needs.validate-version.outputs.version }} completed successfully!"
          echo "📦 Published to NPM: https://www.npmjs.com/package/code-quality-lib"
          echo "🚀 GitHub Release: ${{ needs.create-release.outputs.release_url }}"
