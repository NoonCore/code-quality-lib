name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test Library
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci --prefer-offline --no-audit
        
    - name: Run tests
      run: npm test
      
    - name: Test CLI
      run: |
        npx code-quality --help || echo "CLI test completed"
        
    - name: Test library loading
      run: |
        node -e "
        const { CodeQualityChecker } = require('code-quality-lib');
        console.log('✅ Library loads successfully');
        console.log('✅ Export:', typeof CodeQualityChecker);
        "
