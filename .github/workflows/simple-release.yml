name: Simple Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test-and-publish:
    name: Test & Publish
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Run tests
        run: npm test

      - name: Validate package
        run: npm pack --dry-run

      - name: Check if version already published
        id: version_check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view code-quality-lib versions --json 2>/dev/null || echo "[]")
          if echo "$PUBLISHED" | grep -q "\"$VERSION\""; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "⏭️ Version $VERSION already published, skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "📦 Version $VERSION not yet published, proceeding"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to NPM
        if: steps.version_check.outputs.skip == 'false'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: steps.version_check.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
